base_url = "http://localhost:1111"
title = "RustWerk Knowledge Graph"
description = "Architecture, concepts, decisions, and integrations for RustWerk."
compile_sass = true
build_search_index = true
default_language = "en"
generate_feeds = false

[markdown]
smart_punctuation = true

[link_checker]
internal_level = "error"
external_level = "warn"

[search]
include_title = true
include_description = true
include_content = true

[[taxonomies]]
name = "tags"
feed = false

[[taxonomies]]
name = "note_types"
feed = false
